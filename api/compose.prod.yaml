
name: prod-api

services:

  db:
    image: postgres:18
    hostname: db
    environment:
      POSTGRES_USER: ${DB_USER:-store}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-devpass}
      POSTGRES_DB: ${DB_NAME:-store}

  account:
    image: humbertosandmann/account:latest
    hostname: account
    environment:
      DATABASE_HOST: db
      DATABASE_PORT: 5432
      DATABASE_DB: ${DB_NAME:-store}
      DATABASE_USERNAME: ${DB_USER:-store}
      DATABASE_PASSWORD: ${DB_PASSWORD:-devpass}
    deploy:
      replicas: 1
    depends_on:
      - db

  exchange:
    image: projetomicro/exchange:latest
    hostname: exchange
    environment:
      EXCHANGE_PROVIDER_URL: ${EXCHANGE_PROVIDER_URL:-https://economia.awesomeapi.com.br/json/last/{from_currency}-{to_currency}}
      EXCHANGE_CACHE_TTL_SECONDS: ${EXCHANGE_CACHE_TTL_SECONDS:-60}
      EXCHANGE_REQUEST_TIMEOUT_SECONDS: ${EXCHANGE_REQUEST_TIMEOUT_SECONDS:-5}

