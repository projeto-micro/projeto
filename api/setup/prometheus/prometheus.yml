scrape_configs:

  - job_name: 'GatewayMetrics'
    metrics_path: '/gateway/actuator/prometheus'
    scrape_interval: 1s
    static_configs:
      - targets:
        - gateway:8080
        labels:
          application: 'Gateway Application'

  - job_name: 'ExchangeMetrics'
    metrics_path: '/metrics'
    scrape_interval: 1s
    static_configs:
      - targets:
        - exchange:8080
        labels:
          application: 'Exchange Application'

  - job_name: 'OrderMetrics'
    metrics_path: '/metrics'
    scrape_interval: 1s
    static_configs:
      - targets:
        - order:8080
        labels:
          application: 'Order Application'

  - job_name: 'ProductMetrics'
    metrics_path: '/actuator/prometheus'
    scrape_interval: 1s
    static_configs:
      - targets:
        - product:8080
        labels:
          application: 'Product Application'
